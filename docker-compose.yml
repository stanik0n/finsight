services:
  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-finsight}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-finsight123}
    ports:
      - '9000:9000'
      - '9001:9001'
    volumes:
      - minio-data:/data
    healthcheck:
      test: ['CMD', 'mc', 'ready', 'local']
      interval: 10s
      retries: 5
    restart: unless-stopped

  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
        mc alias set local http://minio:9000 ${MINIO_ROOT_USER:-finsight} ${MINIO_ROOT_PASSWORD:-finsight123};
        mc mb --ignore-existing local/finsight;
        echo 'Bucket finsight ready.';
      "
    restart: 'no'

  prefect:
    image: finsight-prefect:latest
    build:
      context: .
      dockerfile: ./prefect/Dockerfile
    ports:
      - '4200:4200'
    volumes:
      - prefect-data:/root/.prefect
    restart: unless-stopped

  pipeline:
    image: finsight-pipeline:latest
    build:
      context: .
      dockerfile: ./pipeline/Dockerfile
    depends_on:
      minio:
        condition: service_started
      prefect:
        condition: service_started
    environment:
      ALPACA_API_KEY: ${ALPACA_API_KEY}
      ALPACA_SECRET_KEY: ${ALPACA_SECRET_KEY}
      GROQ_API_KEY: ${GROQ_API_KEY}
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER:-finsight}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-finsight123}
      S3_BUCKET: finsight
      DUCKDB_PATH: /data/finsight.duckdb
      PREFECT_API_URL: http://prefect:4200/api
    volumes:
      - data:/data
    command: sh -c "tail -f /dev/null"
    restart: unless-stopped

  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    depends_on:
      - minio
    environment:
      GROQ_API_KEY: ${GROQ_API_KEY}
      DUCKDB_PATH: /data/finsight.duckdb
    volumes:
      - data:/data
    ports:
      - '8000:8000'
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:8000/health']
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped

  frontend:
    image: node:20-alpine
    working_dir: /app
    volumes:
      - ./frontend:/app
    ports:
      - '3000:3000'
    command: sh -c "npm install && npm run dev"
    environment:
      VITE_API_URL: http://localhost:8000
    depends_on:
      - api
    restart: unless-stopped

volumes:
  minio-data:
    name: finsight_minio-data
  prefect-data:
    name: finsight_prefect-data
  data:
    name: finsight_data
