services:
  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-finsight}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-finsight123}
    ports:
      - '9000:9000'
      - '9001:9001'
    volumes:
      - minio-data:/data
    healthcheck:
      test: ['CMD', 'mc', 'ready', 'local']
      interval: 10s
      retries: 5
    restart: unless-stopped

  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
        mc alias set local http://minio:9000 ${MINIO_ROOT_USER:-finsight} ${MINIO_ROOT_PASSWORD:-finsight123};
        mc mb --ignore-existing local/finsight;
        echo 'Bucket finsight ready.';
      "
    restart: 'no'

  kafka:
    image: confluentinc/cp-kafka:7.6.1
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: 'true'
      CLUSTER_ID: 'MkU3OEVBNTcwNTJENDM2Qk'
    ports:
      - '9092:9092'
    healthcheck:
      test: ['CMD', 'kafka-topics', '--bootstrap-server', 'localhost:9092', '--list']
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s
    restart: unless-stopped

  prefect:
    image: finsight-prefect:latest
    build:
      context: .
      dockerfile: ./prefect/Dockerfile
    ports:
      - '4200:4200'
    volumes:
      - prefect-data:/root/.prefect
    restart: unless-stopped

  pipeline:
    image: finsight-pipeline:latest
    build:
      context: .
      dockerfile: ./pipeline/Dockerfile
    depends_on:
      minio:
        condition: service_started
      prefect:
        condition: service_started
    environment:
      ALPACA_API_KEY: ${ALPACA_API_KEY}
      ALPACA_SECRET_KEY: ${ALPACA_SECRET_KEY}
      GROQ_API_KEY: ${GROQ_API_KEY}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      TELEGRAM_CHAT_ID: ${TELEGRAM_CHAT_ID:-}
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER:-finsight}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-finsight123}
      S3_BUCKET: finsight
      DUCKDB_PATH: /data/finsight.duckdb
      PREFECT_API_URL: http://prefect:4200/api
    volumes:
      - data:/data
    command: sh -c "tail -f /dev/null"
    restart: unless-stopped

  stream-producer:
    image: finsight-pipeline:latest
    depends_on:
      kafka:
        condition: service_healthy
    environment:
      ALPACA_API_KEY: ${ALPACA_API_KEY}
      ALPACA_SECRET_KEY: ${ALPACA_SECRET_KEY}
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
    command: python ingestion/alpaca_stream.py
    restart: unless-stopped

  hot-consumer:
    image: finsight-pipeline:latest
    depends_on:
      kafka:
        condition: service_healthy
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      INTRADAY_DUCKDB_PATH: /data/intraday.duckdb
    volumes:
      - data:/data
    command: python orchestration/scripts/hot_consumer.py
    restart: unless-stopped

  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    depends_on:
      - minio
    environment:
      GROQ_API_KEY: ${GROQ_API_KEY}
      DUCKDB_PATH: /data/finsight.duckdb
      INTRADAY_DUCKDB_PATH: /data/intraday.duckdb
    volumes:
      - data:/data
    ports:
      - '8000:8000'
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:8000/health']
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped

  frontend:
    image: node:20-alpine
    working_dir: /app
    volumes:
      - ./frontend:/app
    ports:
      - '3000:3000'
    command: sh -c "npm install && npm run dev"
    environment:
      VITE_API_URL: http://localhost:8000
    depends_on:
      - api
    restart: unless-stopped

volumes:
  minio-data:
    name: finsight_minio-data
  prefect-data:
    name: finsight_prefect-data
  data:
    name: finsight_data
