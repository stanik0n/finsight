version: 2

sources:
  - name: silver
    schema: silver
    description: "Silver layer — enriched OHLCV + indicators, loaded by load_silver_to_duckdb.py"
    tables:
      - name: stock_metrics
        description: "One row per symbol per trading day with computed indicators"
        columns:
          - name: symbol
            description: "Ticker symbol"
            tests: [not_null]
          - name: date
            description: "Trading date"
            tests: [not_null]
          - name: close
            description: "Closing price"
            tests: [not_null]
          - name: volume
            description: "Daily volume"
            tests: [not_null]
